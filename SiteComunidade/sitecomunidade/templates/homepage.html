{% extends 'base.html' %}

{% block body %}
<div class="container">
    <hr>
    <h1 style="color: orange; text-align: center;">COMUNIDADE</h1>
    <h3 style="text-align: center;">Posts da Galera da Comunidade</h3>
    <hr>
    {% for post in posts %}
            <div class="row border mt-4 p-3 meupost">
                <div class="col col-3">
                    <a style="text-decoration: None;" href="{{ url_for('perfil', id_usuario=post.id_usuario) }}">
                        <img src="{{ url_for('static', filename='fotos_perfil/{}'.format(post.autor.foto_perfil)) }}" class="img-thumbnail" alt="FotoPerfil">
                        <strong>{{ post.autor.username }}</strong>
                    </a>
                </div>
                <div class="col col-9">
                    <a style="text-decoration: None;" href="{{ url_for('exibir_post', post_id=post.id) }}"><h3>{{ post.titulo }}</h3></a>
                    <p>{{ post.corpo }}</p>
                </div>

            </div>
            {% endfor %}
</div>
{% endblock %}
